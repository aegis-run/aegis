name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'Merge pull request #')

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-flake-${{ hashFiles('flake.lock') }}
          upload-chunk-size: 268435456
          gc-max-store-size-linux: 2147483648
          purge: true
          purge-created: 0

      - run: nix flake check --print-build-logs
      - run: nix develop --command go test -race ./...

  docker:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-flake-${{ hashFiles('flake.lock') }}
          upload-chunk-size: 268435456
          gc-max-store-size-linux: 2147483648
          purge: true
          purge-created: 0

      - run: nix build .#docker

      - id: docker_load
        run: |
          IMAGE=$(docker load < result | sed -n 's/Loaded image: //p')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - run: docker run --rm "${{ steps.docker_load.outputs.image }}" /bin/aegis --version
