name: Scheduled

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix develop --command just vuln
      - run: nix develop --command just sast

  update-deps:
    name: Update Go dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Tidy and verify
        run: |
          nix develop --command just mod-tidy
          nix develop --command just mod-verify
          nix develop --command just mod-download

      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          commit-message: "chore: update go dependencies"
          title: "chore: weekly Go dependency update"
          body: "Automated weekly update of Go dependencies via `go mod tidy`."
          branch: "automation/dep-update"
          delete-branch: true

  update-flake:
    name: Update flake inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          commit-message: "chore: update flake inputs"
          title: "chore: weekly flake inputs update"
          body: "Automated weekly update of `flake.lock`."
          branch: "automation/flake-update"
          delete-branch: true
